name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to keep PR feedback fast.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Gate (format · lint · typecheck · test · build)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Active Node.js LTS lines (22, 24) plus the current line (26, matches
      # .nvmrc). Node 20 reached EOL 2026-04-30. See https://github.com/nodejs/release
      matrix:
        node: ['22.x', '24.x', '26.x']
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Gate (format:check → lint → typecheck → test → build)
        run: npm run gate
